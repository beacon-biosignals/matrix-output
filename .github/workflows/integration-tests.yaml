---
name: Integration Tests
on:
  pull_request:
    paths:
      - "action.yaml"
      - ".github/workflows/integration-tests.yaml"

jobs:
  exec-simple:
    name: Execute Simple
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        index:
          - 1
          - 2
    outputs:
      results-json: ${{ steps.matrix-output.outputs.json }}
    steps:
      - uses: actions/checkout@v5
      # Slow down on job to ensure that this is the last run
      - if: ${{ strategy.job-index == 0 }}
        run: sleep 5
      # Keep `id` the same between `exec-simple` and `exec-complex`
      # to ensure we can separate output per job.
      - uses: ./
        id: matrix-output
        with:
          yaml: |
            index: ${{ matrix.index }}
          debug: true

  test-simple:
    name: Test Simple
    needs: exec-simple
    runs-on: ubuntu-latest
    steps:
      - name: Output JSON
        run: |
          if [[ "${output_json}" != "${expected_json}" ]]; then
              cat <<<"${output_json}" >"output"
              cat <<<"${expected_json}" >"expected"
              diff output expected | cat -te
              exit 1
          fi
        env:
          output_json: ${{ needs.exec-simple.outputs.results-json }}
          expected_json: |-
            [
              {
                "index": 1
              },
              {
                "index": 2
              }
            ]

  exec-complex:
    name: Execute Complex
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: App One
            repo: user/app1
          - name: App Two
            repo: user/app2
        version:
          - "1.0"
          - "2.0"
    outputs:
      results-json: ${{ steps.matrix-output.outputs.json }}
    steps:
      - uses: actions/checkout@v5
      # Keep `id` the same between `exec-simple` and `exec-complex`
      # to ensure we can separate output per job.
      - uses: ./
        id: matrix-output
        with:
          yaml: |
            name: ${{ matrix.build.name }}
            repo: ${{ matrix.build.repo }}
            version_string: "${{ matrix.version }}"
            version_number: ${{ matrix.version }}
          debug: true

  test-complex:
    name: Test Complex
    needs: exec-complex
    runs-on: ubuntu-latest
    steps:
      - name: Output JSON
        run: |
          if [[ "${output_json}" != "${expected_json}" ]]; then
              cat <<<"${output_json}" >"output"
              cat <<<"${expected_json}" >"expected"
              diff output expected | cat -te
              exit 1
          fi
        env:
          output_json: ${{ needs.exec-complex.outputs.results-json }}
          expected_json: |-
            [
              {
                "name": "App One",
                "repo": "user/app1",
                "version_string": "1.0",
                "version_number": 1
              },
              {
                "name": "App One",
                "repo": "user/app1",
                "version_string": "2.0",
                "version_number": 2
              },
              {
                "name": "App Two",
                "repo": "user/app2",
                "version_string": "1.0",
                "version_number": 1
              },
              {
                "name": "App Two",
                "repo": "user/app2",
                "version_string": "2.0",
                "version_number": 2
              }
            ]

  test-empty:
    name: Test Empty
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        id: matrix-output
        continue-on-error: true
        with:
          yaml: ""
          debug: true
      - name: Action failed
        if: ${{ steps.matrix-output.outcome != 'failure' }}
        run: exit 1

  test-duplicate:
    name: Test Duplicate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        id: matrix-output1
        continue-on-error: true
        with:
          yaml: |
            demo: 1
          debug: true
      - uses: ./
        id: matrix-output2
        continue-on-error: true
        with:
          yaml: |
            demo: 2
          debug: true
      - name: Action failed
        if: ${{ steps.matrix-output1.outcome != 'success' || steps.matrix-output2.outcome != 'failure' }}
        run: |
          echo "matrix-output1: ${{ steps.matrix-output1.outcome }}" >&2
          echo "matrix-output2: ${{ steps.matrix-output2.outcome }}" >&2
          exit 1

  exec-race-condition:
    name: ExecuteRace Condition
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        index:
          - 1
          - 2
    outputs:
      results-json: ${{ steps.matrix-output.outputs.json }}
    steps:
      - uses: actions/checkout@v5
      - if: ${{ strategy.job-index == 0 }}
        run: sleep 5
      - uses: ./
        id: matrix-output
        with:
          yaml: |
            index: ${{ matrix.index }}
          debug: true
      - if: ${{ strategy.job-index == 1 }}
        run: sleep 30

  test-race-condition:
    name: Test Race Condition
    needs: exec-race-condition
    runs-on: ubuntu-latest
    steps:
      - name: Output JSON
        run: |
          if [[ "${output_json}" != "${expected_json}" ]]; then
              cat <<<"${output_json}" >"output"
              cat <<<"${expected_json}" >"expected"
              diff output expected | cat -te
              exit 1
          fi
        env:
          output_json: ${{ needs.exec-race-condition.outputs.results-json }}
          expected_json: |-
            [
              {
                "index": 1
              },
              {
                "index": 2
              }
            ]

  # Workflow which contain a large number of jobs may run into "bash: Argument list too long"
  # if we haven't reduced the job content internally. If this occurs failures may also occur
  # on other integration tests.
  setup-large:
    name: Setup Large
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      matrix-json: ${{ steps.matrix.outputs.json }}
    steps:
      - id: matrix
        run: |
          matrix='{"job": []}'
          for i in {1..30}; do
            # Include a UUID to artificially increase the job name length
            uuid="$(cat /proc/sys/kernel/random/uuid)"
            matrix="$(
              jq \
              --argjson index "$i" \
              --arg uuid "${uuid}" \
              '.job += [{index: $index, uuid: $uuid}]' \
              <<<"${matrix}"
            )"
          done

          {
            echo "json<<EOF"
            jq '.' <<<"${matrix}"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

  exec-large:
    name: Execute Large (${{ matrix.job.index }}, ${{ matrix.job.uuid }})
    needs: setup-large
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-large.outputs.matrix-json) }}
    outputs:
      results-json: ${{ steps.matrix-output.outputs.json }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./
        id: matrix-output
        with:
          yaml: |
            index: ${{ matrix.job.index }}
            uuid: ${{ matrix.job.uuid }}
          debug: true

  test-large:
    name: Test Large
    needs:
      - setup-large
      - exec-large
    runs-on: ubuntu-latest
    steps:
      - name: Expected JSON
        id: expected
        run: |
          json="$(jq '.job | map({index, uuid})' <<<"${matrix}")"
          {
            echo "json<<EOF"
            jq '.' <<<"${json}"
            echo "EOF"
          } >>"$GITHUB_OUTPUT"
        env:
          matrix: ${{ needs.setup-large.outputs.matrix-json }}
      - name: Output JSON
        run: |
          if [[ "${output_json}" != "${expected_json}" ]]; then
              cat <<<"${output_json}" >"output"
              cat <<<"${expected_json}" >"expected"
              diff output expected | cat -te
              exit 1
          fi
        env:
          output_json: ${{ needs.exec-large.outputs.results-json }}
          expected_json: ${{ steps.expected.outputs.json}}
